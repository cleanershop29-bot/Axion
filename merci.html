<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Demande reçue — Axion App Studio</title>
<meta name="robots" content="noindex">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--b2:#7C3AED;--b1:#2563EB;--c1:#FF6B35;--txt:#0A0A0F;--txm:#3D3D50;--txl:#8888A0;--bg:#FAFAFA;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;overflow:hidden;position:relative}
.blob{position:absolute;border-radius:50%;pointer-events:none}
.b1{width:400px;height:400px;background:radial-gradient(circle,rgba(255,107,53,.12),transparent 65%);top:-100px;left:-100px}
.b2{width:400px;height:400px;background:radial-gradient(circle,rgba(124,58,237,.10),transparent 65%);bottom:-100px;right:-100px}
.card{background:#fff;border-radius:24px;border:1px solid rgba(0,0,0,.08);box-shadow:0 4px 32px rgba(0,0,0,.07);padding:48px 32px;max-width:480px;width:100%;position:relative;z-index:1}
.icon{font-size:3rem;margin-bottom:20px;animation:pop .4s cubic-bezier(.34,1.56,.64,1) both}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
h1{font-size:1.7rem;font-weight:800;letter-spacing:-.03em;margin-bottom:10px}
.sub{font-size:.9rem;color:var(--txm);line-height:1.75;margin-bottom:28px}
.info{background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.15);border-radius:12px;padding:14px 18px;font-size:.82rem;color:#7C3AED;font-weight:600;margin-bottom:28px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;border-radius:50px;font-size:.88rem;font-weight:700;background:linear-gradient(135deg,#FF6B35,#7C3AED);color:#fff;text-decoration:none}
.nav-logo{font-weight:900;font-size:1.1rem;letter-spacing:-.04em;color:#7C3AED;margin-bottom:28px;display:block}
</style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="card">
  <a href="/" class="nav-logo">⚡ Axion App Studio</a>
  <div class="icon">🎉</div>
  <h1>Demande bien reçue !</h1>
  <p class="sub">Merci pour votre message. On a bien reçu votre projet et on vous répond sous 24h avec une proposition adaptée.</p>
  <div class="info">📬 Réponse garantie sous 24h · Sans engagement</div>
  <a href="/" class="btn">← Retour au site</a>
</div>
</body>
</html>
