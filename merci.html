<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Demande reçue — Axion App Studio</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--v:#7C3AED;--o:#FF6B35;--dark:#0D0D1A;--dark2:#16162A}
body{font-family:'Inter',system-ui,sans-serif;background:var(--dark);color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;overflow:hidden;position:relative;-webkit-font-smoothing:antialiased}
.glow1{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,.2),transparent 65%);top:-120px;left:-100px;pointer-events:none}
.glow2{position:absolute;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,rgba(255,107,53,.12),transparent 65%);bottom:-100px;right:-80px;pointer-events:none}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(124,58,237,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,.05) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;-webkit-mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%);mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%)}
.card{background:var(--dark2);border-radius:24px;border:1px solid rgba(124,58,237,.2);box-shadow:0 8px 40px rgba(0,0,0,.3);padding:48px 32px;max-width:460px;width:100%;position:relative;z-index:1}
.logo{display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:32px;text-decoration:none}
.logo-wm{font-size:.9rem;font-weight:800;color:rgba(255,255,255,.5);letter-spacing:.01em}
.logo-wm span{color:#A855F7}
.icon{font-size:2.8rem;margin-bottom:18px;animation:pop .4s cubic-bezier(.34,1.56,.64,1) both}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
h1{font-size:1.6rem;font-weight:800;letter-spacing:-.03em;margin-bottom:10px;color:#fff}
.sub{font-size:.9rem;color:rgba(255,255,255,.48);line-height:1.75;margin-bottom:24px}
.info{background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.24);border-radius:12px;padding:13px 18px;font-size:.82rem;color:#A855F7;font-weight:600;margin-bottom:28px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:50px;font-size:.87rem;font-weight:700;background:var(--v);color:#fff;transition:background .15s}
.btn:hover{background:#6D28D9}
</style>
</head>
<body>
<div class="glow1"></div>
<div class="glow2"></div>
<div class="grid"></div>
<div class="card">
  <a href="/" class="logo">
    <svg width="28" height="28" viewBox="0 0 72 72" fill="none">
      <defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#FF6B35"/></linearGradient></defs>
      <rect width="72" height="72" rx="20" fill="#1a1a2e"/>
      <rect x="1" y="1" width="70" height="70" rx="19" stroke="url(#lg)" stroke-width="2" fill="none"/>
      <path d="M18 56 L36 16 L54 56" stroke="url(#lg)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <line x1="25" y1="41" x2="47" y2="41" stroke="url(#lg)" stroke-width="4" stroke-linecap="round"/>
    </svg>
    <span class="logo-wm">AXION <span>APP STUDIO</span></span>
  </a>
  <div class="icon">🎉</div>
  <h1>Demande bien reçue !</h1>
  <p class="sub">Merci pour votre message. J'ai bien reçu votre projet et je vous réponds sous 24h avec une proposition adaptée.</p>
  <div class="info">📬 Réponse garantie sous 24h · Sans engagement</div>
  <a href="/" class="btn">← Retour au site</a>
</div>
</body>
</html>
